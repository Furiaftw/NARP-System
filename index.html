<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NARP Systems Hub</title>
  
  <!-- Tailwind CSS for Styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons (Replaces Lucide for standalone HTML compatibility) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel to compile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #020617; /* slate-950 */ }
    /* Custom Scrollbar for top nav */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- DATA CONSTANTS ---
    const rankValues = { E: 0, D: 5, C: 10, B: 15, A: 20, S: 25 };

    function App() {
      const [activeTab, setActiveTab] = useState('jinchuriki'); 
      const [isSidebarOpen, setSidebarOpen] = useState(false);

      const navItems = [
        { id: 'ranks', label: 'Rank System', iconClass: 'ph-fill ph-medal' },
        { id: 'chakra', label: 'OCS & Tracking', iconClass: 'ph-fill ph-activity' },
        { id: 'battlemodes', label: 'Battle Modes', iconClass: 'ph-fill ph-lightning' },
        { id: 'sagemode', label: 'Sage Mode', iconClass: 'ph-fill ph-leaf' },
        { id: 'curseseal', label: 'Curse Seal', iconClass: 'ph-fill ph-hexagon' },
        { id: 'jinchuriki', label: 'Jinchuriki System', iconClass: 'ph-fill ph-fire' },
        { id: 'genjutsu', label: 'Genjutsu', iconClass: 'ph-fill ph-eye' },
        { id: 'poison', label: 'Poison System', iconClass: 'ph-fill ph-skull' },
        { id: 'consumables', label: 'Consumables', iconClass: 'ph-fill ph-flask' },
        { id: 'summoning', label: 'Summoning', iconClass: 'ph-fill ph-scroll' },
        { id: 'customItems', label: 'Custom Items', iconClass: 'ph-fill ph-sword' },
      ];

      const renderContent = () => {
        switch (activeTab) {
          case 'ranks': return <RankSystemView />;
          case 'chakra': return <ChakraSystemView />;
          case 'battlemodes': return <BattleModesView />;
          case 'sagemode': return <SageModeView />;
          case 'curseseal': return <CurseSealView />;
          case 'jinchuriki': return <JinchurikiSystemView />;
          case 'genjutsu': return <GenjutsuSystemView />;
          case 'poison': return <PoisonSystemView />;
          case 'consumables': return <ConsumablesView />;
          case 'summoning': return <SummoningSystemView />;
          case 'customItems': return <CustomItemsView />;
          default: return <div className="text-white">Select a valid tab.</div>;
        }
      };

      return (
        <div className="min-h-screen text-slate-300 font-sans flex flex-col selection:bg-cyan-500 selection:text-white">
          
          {/* Top Navbar */}
          <header className="bg-slate-900 border-b border-cyan-500/30 sticky top-0 z-50 shadow-[0_4px_24px_rgba(6,182,212,0.1)]">
            <div className="max-w-7xl mx-auto px-4">
              <div className="flex justify-between items-center h-16">
                {/* Logo */}
                <div className="flex items-center gap-2 shrink-0 pr-4">
                  <i className="ph-fill ph-book-open text-2xl text-cyan-400"></i>
                  <h1 className="text-xl font-black text-cyan-400 tracking-widest uppercase drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]">
                    NARP SYSTEMS
                  </h1>
                </div>

                {/* Desktop Nav */}
                <nav className="hidden lg:flex items-center gap-1 overflow-x-auto hide-scrollbar">
                  {navItems.map((item) => {
                    const isActive = activeTab === item.id;
                    return (
                      <button
                        key={item.id}
                        onClick={() => setActiveTab(item.id)}
                        className={`flex items-center gap-1.5 px-3 py-2 rounded-md transition-all duration-200 whitespace-nowrap ${
                          isActive 
                            ? 'bg-cyan-950/60 text-cyan-300 border border-cyan-500/50 shadow-[0_0_10px_rgba(6,182,212,0.2)]' 
                            : 'text-slate-400 hover:bg-slate-800 hover:text-cyan-400'
                        }`}
                      >
                        <i className={`${item.iconClass} text-[16px] ${isActive ? 'text-cyan-400' : ''}`}></i>
                        <span className="font-medium text-sm">{item.label}</span>
                      </button>
                    );
                  })}
                </nav>

                {/* Mobile Menu Toggle */}
                <button 
                  onClick={() => setSidebarOpen(!isSidebarOpen)} 
                  className="lg:hidden text-cyan-400 focus:outline-none p-2 shrink-0"
                >
                  {isSidebarOpen ? <i className="ph ph-x text-[26px]"></i> : <i className="ph ph-list text-[26px]"></i>}
                </button>
              </div>
            </div>

            {/* Mobile Nav Dropdown */}
            {isSidebarOpen && (
              <nav className="lg:hidden border-t border-slate-800 bg-slate-900 px-4 py-4 grid grid-cols-2 gap-2 max-h-[70vh] overflow-y-auto shadow-xl">
                {navItems.map((item) => {
                  const isActive = activeTab === item.id;
                  return (
                    <button
                      key={item.id}
                      onClick={() => { setActiveTab(item.id); setSidebarOpen(false); }}
                      className={`flex items-center gap-2 px-3 py-3 rounded-lg transition-all duration-200 text-left ${
                        isActive 
                          ? 'bg-cyan-950/60 text-cyan-300 border border-cyan-500/50' 
                          : 'text-slate-400 hover:bg-slate-800 hover:text-cyan-400 border border-transparent'
                      }`}
                    >
                      <i className={`${item.iconClass} text-[18px] shrink-0 ${isActive ? 'text-cyan-400' : ''}`}></i>
                      <span className="font-medium text-sm leading-tight">{item.label}</span>
                    </button>
                  );
                })}
              </nav>
            )}
          </header>

          {/* Main Content Area */}
          <main className="flex-1 p-5 md:p-10 overflow-y-auto relative z-0">
            <div className="max-w-4xl mx-auto pb-24">
              {renderContent()}
            </div>
          </main>
        </div>
      );
    }

    // --- SUB-VIEWS ---

    function JinchurikiSystemView() {
      return (
        <div className="space-y-12 animate-fade-in">
          <header className="border-b border-slate-800 pb-6">
            <h2 className="text-3xl md:text-4xl font-bold text-white tracking-tight flex items-center gap-3">
              Jinchuriki System <i className="ph-fill ph-fire text-orange-500 text-[32px]"></i>
            </h2>
            <p className="mt-2 text-slate-400">Rules, mechanics, and transformations for the hosts of the Tailed Beasts.</p>
          </header>

          <Section title="Introduction & Obtainment">
            <p className="text-sm text-slate-300 mb-4">A Jinchuriki (vessel/host) is an individual who has had a Tailed Beast sealed within them. The beast grants immense power, but comes with great risk and mental strain. The bond between them is called the <strong>Friendship Level</strong>.</p>
            
            <div className="grid md:grid-cols-2 gap-4">
              <div className="bg-slate-900 p-4 rounded border border-slate-800">
                <h4 className="text-orange-400 font-bold mb-1">Method 1: Starting Host</h4>
                <p className="text-sm text-slate-300">Chosen during character creation. The character starts at exactly <strong>10% Friendship Level</strong>. You must work on building the relationship from the beginning without the ability to immediately harness the beast's power.</p>
              </div>
              <div className="bg-slate-900 p-4 rounded border border-slate-800">
                <h4 className="text-orange-400 font-bold mb-1">Method 2: In-Roleplay</h4>
                <p className="text-sm text-slate-300">Stealing a beast, gaining control of a rogue beast, or being chosen by an organization. Highly complex and dangerous. The new host also starts at exactly <strong>10% Friendship Level</strong>.</p>
              </div>
            </div>
          </Section>

          <Section title="Mechanics & Friendship">
            <p className="text-sm text-slate-300 mb-4">The Tailed Beast's chakra is raw and volatile. The higher the Friendship Level, the more the Jinchuriki can access the full potential without losing themselves to feral outbursts.</p>
            
            <div className="space-y-2 mb-6">
              <div className="bg-slate-900/50 p-3 rounded border-l-4 border-red-500 text-sm"><strong className="text-white">10% - 30% (Hostile):</strong> Fights host's will. Little control. Manifests unpredictably during emotions.</div>
              <div className="bg-slate-900/50 p-3 rounded border-l-4 border-yellow-500 text-sm"><strong className="text-white">40% - 80% (Moderate):</strong> Better management. Taps into abilities without losing themselves. Beast may assist.</div>
              <div className="bg-slate-900/50 p-3 rounded border-l-4 border-green-500 text-sm"><strong className="text-white">90% - 100% (High):</strong> Fully harnesses power. Works in harmony. Beast becomes a willing ally.</div>
            </div>

            <h4 className="text-white font-bold mb-3 border-b border-slate-800 pb-2">Stages of Mastery</h4>
            <div className="overflow-x-auto mb-6">
              <table className="w-full text-left text-sm text-slate-300 border border-slate-700 rounded-lg">
                <thead className="bg-slate-950 text-xs uppercase text-slate-500">
                  <tr>
                    <th className="px-4 py-3 font-medium">Skill %</th>
                    <th className="px-4 py-3 font-medium text-orange-400">Max BCU</th>
                    <th className="px-4 py-3 font-medium">Absorption Rate</th>
                    <th className="px-4 py-3 font-medium">Extra Ability</th>
                    <th className="px-4 py-3 font-medium text-cyan-400">TB Modes</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-800/50 bg-slate-900/50">
                  {[
                    { p: '20%', max: 10, abs: 2, ex: 'Healing Factor', mode: 'Initial Form' },
                    { p: '40%', max: 20, abs: 5, ex: 'Minor TB Bomb', mode: 'Cloak V.1' },
                    { p: '60%', max: 30, abs: 8, ex: '---', mode: 'Partial Transform' },
                    { p: '80%', max: 40, abs: 12, ex: 'Base TB Bomb', mode: 'Cloak V.2' },
                    { p: '100%', max: 50, abs: 15, ex: '---', mode: 'Full TB Form' },
                  ].map(row => (
                    <tr key={row.p} className="hover:bg-slate-800/50 transition-colors">
                      <td className="px-4 py-2 font-bold text-white">{row.p}</td>
                      <td className="px-4 py-2 text-orange-300">{row.max}</td>
                      <td className="px-4 py-2">{row.abs}/turn</td>
                      <td className="px-4 py-2">{row.ex}</td>
                      <td className="px-4 py-2 text-cyan-300">{row.mode}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <h4 className="text-white font-bold mb-3 border-b border-slate-800 pb-2">Extra Abilities Explained</h4>
            
            <div className="space-y-4">
              <div className="bg-slate-900 p-4 rounded border border-slate-800">
                <h5 className="font-bold text-green-400 mb-1">Healing Factor (Unlocks at 20%)</h5>
                <p className="text-sm text-slate-300 mb-2">Initially only works while in a Jinchuriki form. At 50% friendship, can be used outside of forms (but is weaker). Format below: (Cost out of form / Cost in form).</p>
                <ul className="text-sm text-slate-400 space-y-1">
                  <li><strong>Minor:</strong> 5/2 BCU (Same or 1 turn). Small cuts, bruises, burns.</li>
                  <li><strong>Medium:</strong> 8/3 BCU (1-2 turns). Deep gashes, fractured bones.</li>
                  <li><strong>Major:</strong> 10/5 BCU (3-4 turns). Shattered bones, damaged organs. <em>(Requires 50%+ Friendship)</em></li>
                </ul>
                <p className="text-xs text-slate-500 mt-2 italic">Note: Cannot regenerate limbs. Healing is PER wound.</p>
              </div>

              <div className="bg-slate-900 p-4 rounded border border-slate-800">
                <h5 className="font-bold text-purple-400 mb-1">Tailed Beast Bombs & Enhancements</h5>
                <p className="text-sm text-slate-300 mb-2"><strong>Enhancing Jutsu:</strong> Strikes +1 rank higher (cap S-Rank). Cost is (Original CU + Half original cost in BCU). If in a TB Mode, all jutsu use pure BCU. B-Rank = 1 turn CD. A/S-Rank = 2 turn CD.</p>
                <ul className="text-sm text-slate-400 space-y-1">
                  <li><strong>Minor TB Bomb:</strong> Unlocks at 40%. Highly destructive variant.</li>
                  <li><strong>Base TB Bomb:</strong> Unlocks at 80%. Decimates landscapes.</li>
                </ul>
              </div>
            </div>
          </Section>

          <Section title="Transformations & Forms">
            <div className="bg-orange-950/30 border border-orange-900/50 p-4 rounded-lg mb-6">
              <strong className="text-orange-400 block mb-1">Global Recharge Rule</strong>
              <p className="text-sm text-orange-200/80">BCU cannot regenerate while transformed. When exiting a transformation, you must wait <strong>half the number of turns spent in that form (rounded up)</strong> before absorbing BCU again. The additional BCU granted by transformations can only be obtained once per RP per stage.</p>
            </div>

            <div className="space-y-6">
              <div className="border border-slate-700 rounded-lg overflow-hidden">
                <div className="bg-slate-900 p-4 border-b border-slate-700">
                  <h4 className="text-lg font-bold text-white">Initial Form <span className="text-sm font-normal text-slate-400 ml-2">(Unlocks at 20%)</span></h4>
                </div>
                <div className="p-4 bg-slate-900/50">
                  <p className="text-sm text-slate-300 mb-3">Translucent aura. Boosts physicals. Can suppress visible cloak to keep only physical changes.</p>
                  <p className="text-sm text-cyan-400 font-medium mb-3">Bonus: +10 Max BCU | +1 Strength | +10% Ninjutsu.</p>
                  <div className="flex gap-2 flex-wrap text-xs text-slate-400">
                    <span className="bg-slate-800 px-2 py-1 rounded">Drain at 20%: 10 BCU/turn</span>
                    <span className="bg-slate-800 px-2 py-1 rounded">30%: 8 BCU/turn</span>
                    <span className="bg-slate-800 px-2 py-1 rounded">40%: 6 BCU/turn</span>
                    <span className="bg-slate-800 px-2 py-1 rounded">50%: 4 BCU/turn</span>
                    <span className="bg-slate-800 px-2 py-1 rounded">60%: 2 BCU/turn</span>
                  </div>
                </div>
              </div>

              <div className="border border-slate-700 rounded-lg overflow-hidden">
                <div className="bg-slate-900 p-4 border-b border-slate-700">
                  <h4 className="text-lg font-bold text-white">Version 1 Cloak <span className="text-sm font-normal text-slate-400 ml-2">(Unlocks at 40%)</span></h4>
                </div>
                <div className="p-4 bg-slate-900/50">
                  <p className="text-sm text-slate-300 mb-3">Dense, bubbling red shroud. Can manifest chakra limbs/tails (up to beast max). Grants a C-Rank Simulated Shield.</p>
                  <p className="text-sm text-cyan-400 font-medium mb-3">Bonus: +20 Max BCU | +1 Strength | +20% Ninjutsu.</p>
                  <div className="flex gap-2 flex-wrap text-xs text-slate-400">
                    <span className="bg-slate-800 px-2 py-1 rounded">Drain at 40%: 8 BCU/turn</span>
                    <span className="bg-slate-800 px-2 py-1 rounded">60%: 6 BCU/turn</span>
                    <span className="bg-slate-800 px-2 py-1 rounded">80%: 4 BCU/turn</span>
                    <span className="bg-slate-800 px-2 py-1 rounded">100%: 2 BCU/turn</span>
                  </div>
                </div>
              </div>

              <div className="border border-slate-700 rounded-lg overflow-hidden">
                <div className="bg-slate-900 p-4 border-b border-slate-700">
                  <h4 className="text-lg font-bold text-white">Partial Transformation <span className="text-sm font-normal text-slate-400 ml-2">(Unlocks at 60%)</span></h4>
                </div>
                <div className="p-4 bg-slate-900/50">
                  <p className="text-sm text-slate-300 mb-3">Manifest specific beast limbs perfectly. Attempting a full body partial transformation results in a twisted, fleshy, grotesque form.</p>
                  <p className="text-sm text-cyan-400 font-medium mb-1">Bonus: +1 Strength.</p>
                  <p className="text-sm text-slate-400">Drain: X BCU per turn/use (depends on technique rank). Large body manifestations cost 4 BCU/turn.</p>
                </div>
              </div>

              <div className="border border-slate-700 rounded-lg overflow-hidden">
                <div className="bg-slate-900 p-4 border-b border-slate-700">
                  <h4 className="text-lg font-bold text-white">Version 2 Cloak <span className="text-sm font-normal text-slate-400 ml-2">(Unlocks at 80%)</span></h4>
                </div>
                <div className="p-4 bg-slate-900/50">
                  <p className="text-sm text-slate-300 mb-3">Dark red/black shroud defining physical beast traits. Grants B-to-A Rank Shield.</p>
                  <ul className="text-sm text-slate-400 space-y-1 mb-3 list-disc list-inside">
                    <li><strong>Chakra Bones:</strong> Solidified structures serving as armor/weapons. Boosts shield to A-Rank. Costs +2 BCU/turn.</li>
                    <li><strong>Corrosive Chakra:</strong> Burns organic matter on contact (Medium burns). Harms the user unless activated voluntarily (Only Saiken keeps status voluntarily).</li>
                    <li><strong>Overextended Form:</strong> Monstrous semi-complete state. Max corrosive effect. Costs +2 BCU/turn.</li>
                  </ul>
                  <p className="text-sm text-cyan-400 font-medium mb-3">Bonus: +30 Max BCU | +1 Strength | +30% Ninjutsu.</p>
                  <div className="flex gap-2 flex-wrap text-xs text-slate-400">
                    <span className="bg-slate-800 px-2 py-1 rounded">Drain at 80%: 4 BCU/turn</span>
                    <span className="bg-slate-800 px-2 py-1 rounded">90%: 3 BCU/turn</span>
                    <span className="bg-slate-800 px-2 py-1 rounded">100%: 2 BCU/turn</span>
                  </div>
                </div>
              </div>

              <div className="border border-slate-700 rounded-lg overflow-hidden">
                <div className="bg-slate-900 p-4 border-b border-slate-700">
                  <h4 className="text-lg font-bold text-white">Full Tailed Beast Form <span className="text-sm font-normal text-slate-400 ml-2">(Unlocks at 100%)</span></h4>
                </div>
                <div className="p-4 bg-slate-900/50">
                  <p className="text-sm text-slate-300 mb-3">Full scale replica of the beast. Immensely powerful and destructive. Can be activated momentarily for a single attack (costs 2 BCU + Jutsu BCU cost).</p>
                  <p className="text-sm text-cyan-400 font-medium mb-3">Bonus: +40 Max BCU | +2 Strength | +40% Ninjutsu & Taijutsu.</p>
                  <p className="text-sm text-slate-400">Drain: 2 BCU/turn.</p>
                </div>
              </div>
            </div>
          </Section>

          <Section title="Rage System & Limits">
            <div className="grid md:grid-cols-2 gap-6">
              <div className="space-y-4">
                <div className="bg-red-950/20 border border-red-900/50 p-4 rounded-lg">
                  <h5 className="font-bold text-red-400 mb-2 border-b border-red-900/50 pb-2">The Rage State</h5>
                  <p className="text-sm text-slate-300 mb-2">Triggers when chakra pool hits 0 CU. Immediately enters V1 form. Hostile but retains some combat focus. Unconscious when BCU depletes.</p>
                  <p className="text-sm text-red-300 mb-2"><strong>2 Turns in V1:</strong> Escalates to V2. Attacks indiscriminately (friend or foe). Chakra cloak lowers lifespan by 1 year per turn.</p>
                  <p className="text-sm text-red-500 font-bold mb-2"><strong>2 Turns in V2:</strong> Seal breaks entirely. Instant permanent death. Beast is released.</p>
                  <p className="text-xs text-green-400 mt-2">At 80% Friendship, you no longer have to worry about these Rage events.</p>
                </div>
              </div>

              <div className="space-y-4">
                <div className="bg-slate-900 p-4 rounded border border-slate-800">
                  <h5 className="font-bold text-white mb-2">System Limitations</h5>
                  <ul className="text-sm text-slate-400 space-y-1 list-disc list-inside">
                    <li>Cannot be combined with another Major Battle Mode.</li>
                    <li>Statistics cap at S-Rank and 100%.</li>
                    <li><strong>Genjutsu Disruption:</strong> At 80% Friendship, the Beast can disrupt the host's chakra to break Genjutsu/Paralysis. Not automatic. Cannot be put under Genjutsu while in TB Form.</li>
                    <li><strong>Simulated Shields:</strong> Reduce incoming attacks below its rank by 1 rank. Absorbs a set number of hits before collapsing. Bypassed by Genjutsu/Internal damage.</li>
                  </ul>
                </div>
              </div>
            </div>
          </Section>

          <Section title="Beast Profiles & Unique Benefits">
            <p className="text-sm text-slate-300 mb-6">Each Tailed Beast grants completely unique abilities, Kekkei Genkai, and characteristics to their host as friendship increases. Click on a beast to view their details.</p>
            
            {/* Shukaku */}
            <BeastProfile name="Shukaku" tails="1" title="The One Tail">
              <p className="text-sm text-slate-300 mb-3">Childish, short-tempered, proud of defenses. Hates humans and Kurama. Made of sand.</p>
              <div className="bg-slate-950 p-3 rounded mb-4 border border-slate-800">
                <h6 className="text-cyan-400 font-bold mb-1 text-sm">Friendship Unlocks</h6>
                <ul className="text-sm text-slate-400 space-y-1">
                  <li><strong>30%:</strong> Gains Sand Release KKG.</li>
                  <li><strong>50%:</strong> Shukaku's Curse Seals (requires specific jutsu).</li>
                  <li><strong>80%:</strong> Auto-defense (Sand Shield jutsu costs 1 rank less).</li>
                  <li><strong>Initial Form Aura:</strong> Hardens into protective sand (reduces physical/elemental damage by 1 tier). Aesthetic: Sandy hair, claws, sand patterns, gold eyes with star pupils.</li>
                  <li><strong>Full TB Form Exception:</strong> Sand construct. Can regenerate limbs (Minor 2 BCU, Medium 4 BCU/1 turn, Major 6 BCU/2 turns).</li>
                </ul>
              </div>
              <div className="bg-slate-950 p-3 rounded border border-slate-800">
                <h6 className="text-white font-bold mb-1 text-sm">Sand Release (KKG)</h6>
                <p className="text-sm text-slate-400">Manipulate sand density for swift attacks or strong defenses. Weakness: Large amounts of water weaken density (-1 to CC). Explosive clay, gold dust, or oil also counter it. Cannot use gold/iron sand.</p>
              </div>
            </BeastProfile>

            {/* Matatabi */}
            <BeastProfile name="Matatabi" tails="2" title="The Two Tails">
              <p className="text-sm text-slate-300 mb-3">Calm, polite, proud. Made of cobalt blue and black flames. Heterochromatic eyes.</p>
              <div className="bg-slate-950 p-3 rounded mb-4 border border-slate-800">
                <h6 className="text-cyan-400 font-bold mb-1 text-sm">Friendship Unlocks</h6>
                <ul className="text-sm text-slate-400 space-y-1">
                  <li><strong>Base:</strong> Matatabi's Flames. Fire Release burns away target's CU equal to the jutsu's original rank cost per hit (e.g., C-rank burns 4 CU).</li>
                  <li><strong>60%:</strong> Flat +1 bonus to Speed.</li>
                  <li><strong>80%:</strong> Unlocks Cat's Eye Dojutsu.</li>
                  <li><strong>Initial Form Aura:</strong> Radiates blue flames. Melee attacks cause minor burn damage. CQC gains ignition effect. Aesthetic: Blue fire hair, claws, green-blue eyes.</li>
                </ul>
              </div>
              <div className="bg-slate-950 p-3 rounded border border-slate-800">
                <h6 className="text-white font-bold mb-1 text-sm">Cat's Eye (Dojutsu)</h6>
                <p className="text-sm text-slate-400">Costs 4 CU. Grants thermal vision to track heat signatures through smoke/darkness. Enhanced low-light vision. Cannot detect inanimate objects.</p>
              </div>
            </BeastProfile>

            {/* Isobu */}
            <BeastProfile name="Isobu" tails="3" title="The Three Tails">
              <p className="text-sm text-slate-300 mb-3">Timid, reserved, observant. Giant turtle with a crab-like shell.</p>
              <div className="bg-slate-950 p-3 rounded mb-4 border border-slate-800">
                <h6 className="text-cyan-400 font-bold mb-1 text-sm">Friendship Unlocks</h6>

              <span className="w-2 h-6 bg-yellow-500 rounded-full inline-block"></span>
              Leadership & Legendary Ranks
            </h3>
            <p className="text-slate-400 text-sm">Note: Kages can only be NPCs at start, and Sannins / Minor village leaders ranks must be achieved IC.</p>

            <RankCard 
              title="Kage"

              startStats="2 at S rank, the rest at A or lower"

              startStats="2 at S rank, the rest at A or lower"
              startSkills="3 at 80%, the rest at 60% or lower"
              maxStats="3 at S rank, the rest at A or lower"
              maxSkills="2 at 100%, the rest at 80% or lower"
              startTechs={<><strong>3 Natures | 25 Jutsu</strong><br/><span className="text-slate-400 text-xs">--2 S rank, 7 A rank, 8 B rank, 14 C rank or below</span></>}
              maxTechs={<><strong>30 Jutsu</strong><br/><span className="text-slate-400 text-xs">--3 S rank, 10 A rank, 10 B rank, 16 C rank or below</span><br/><span className="text-cyan-500/80 text-xs italic mt-1 block">[Meaning you can learn 5 more IRP/IC]</span></>}

              maxTechs={<><strong>30 Jutsu</strong><br/><span className="text-slate-400 text-xs">--3 S rank, 10 A rank, 10 B rank, 16 C rank or below</span><br/><span className="text-cyan-500/80 text-xs italic mt-1 block">[Meaning you can learn 5 more IRP/IC]</span></>}
